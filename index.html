<!DOCTYPE html>
<!-- [수정 변수] 글로벌 검색엔진 최적화를 위해 다국어 처리가 가능하도록 설계했습니다 -->
<html lang="ko">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1491475716950230"
     crossorigin="anonymous"></script>
    <meta charset="UTF-8">
    <!-- 모바일 기기 화면 비율을 맞추는 필수 반응형 메타 태그입니다 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="meta-title">멋진 신세계 테스트</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 상단 언어 선택 토글 버튼 (글로벌 사용자 대응 코딩) -->
        <div class="lang-selector">
            <button onclick="switchLanguage('ko')">KR</button>
            <button onclick="switchLanguage('en')">EN</button>
        </div>

        <!-- 1. 시작 화면 -->
        <div id="start-view" class="view">
            <h1 id="start-title">🔮</h1>
            <p id="start-desc"></p>
            <button id="start-btn" onclick="startTest()"></button>
        </div>

        <!-- 2. 질문 화면 -->
        <div id="question-view" class="view hidden">
            <div id="progress">1 / 4</div>
            <h2 id="question-text"></h2>
            <div id="answer-buttons"></div>
            
            <div class="ad-banner">
                <p>[AD SPACE]</p>
            </div>
        </div>

        <!-- 3. 로딩 및 광고 화면 -->
        <div id="loading-view" class="view hidden">
            <h2 id="loading-text"></h2>
            <div class="spinner"></div>
        </div>

        <!-- 4. 결과 화면 -->
        <div id="result-view" class="view hidden">
            <p class="result-sub" id="result-sub-text"></p>
            <h1 id="result-title"></h1>
            <p id="result-desc"></p>
            
            <div class="ad-banner">
                <p>[AD SPACE]</p>
            </div>

            <button id="restart-btn" onclick="restartTest()"></button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
